<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/submit" method="POST" class="student-form">
    
        <div>
            <label for="s-id">Student ID : </label>
            <input type="text" id="s-id" name="student_id" placeholder="Enter Student ID" required>
        </div>
        

        <label for="roll">Roll Number : </label>
        <input type="text" id="roll" name="roll_number" placeholder="Enter Roll Number" required>

        <label for="s-name">Full Name : </label>
        <input type="text" id="s-name" name="student_name" placeholder="Enter Student Name" required>

        <label for="f-name">Father's Name : </label>
        <input type="text" id="f-name" name="father_name" placeholder="Enter Father's Name" required>

        <label for="m-name">Mother's Name : </label>
        <input type="text" id="m-name" name="mother_name" placeholder="Enter Mother's Name" required>

        <label for="dob">Date of Birth : </label>
        <input type="date" id="dob" name="dob" required>

        <label for="gender">Gender : </label>
        <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <label for="s-num">Mobile Number : </label>
        <input type="tel" id="s-num" name="mobile" placeholder="Enter Mobile Number" required>

        <label for="email">Email Address : </label>
        <input type="email" id="email" name="email" placeholder="Enter Email" required>

        <label for="address">Address : </label>
        <textarea id="address" name="address" placeholder="Enter Address" rows="3" required></textarea>

        <label for="course">Course : </label>
        <select id="course" name="course" required>
            <option value="">Select Course</option>
            <option value="btech">B.Tech</option>
            <option value="mtech">M.Tech</option>
            <option value="bba">BBA</option>
            <option value="mba">MBA</option>
            <option value="mca">MCA</option>
            <option value="bca">BCA</option>
        </select>

        <label>Year : </label>
        <div class="year-group">
            <label><input type="radio" name="year" value="1" required> 1st Year</label>
            <label><input type="radio" name="year" value="2"> 2nd Year</label>
            <label><input type="radio" name="year" value="3"> 3rd Year</label>
            <label><input type="radio" name="year" value="4"> 4th Year</label>
        </div>


        <label for="admission">Admission Date : </label>
        <input type="date" id="admission" name="admission_date" required>

        <label for="blood">Blood Group : </label>
        <input type="text" id="blood" name="blood_group" placeholder="Ex: O+" >

        <label for="guardian">Guardian Contact : </label>
        <input type="tel" id="guardian" name="guardian_contact" placeholder="Enter Guardian Number" required>

        <button type="submit">Register Student</button>
    </form>
</body>
</html>
