<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="edit">
            <h3>Admin window</h3>
            <div class="edittype">
                <label for="s">
                    <input type="radio" value="students" name="type" id="s"> Students
                </label>
                <label for="t">
                    <input type="radio" value="teachers" name="type" id="t"> Teachers
                </label>
            </div>
            <div class="minwindow"> 
                
                <div class="operation" id="add"><img src="./icons/001-edit.png" alt=""></div>
                <div class="operation" id="get"><img src="./icons/002-research.png" alt=""> </div>
                <div class="operation" id="update"> <img src="./icons/002-update.png" alt=""> </div>
                <div class="operation" id="replace"> <img src="./icons/003-replace.png" alt=""> </div>
                <div class="operation" id="delete"><img src="./icons/001-delete.png" alt=""></div>
                <div class="operation" id="other"><img src="./icons/003-menu.png" alt=""></div>
            </div>
        </div>
        
    </main>
    <script src="script.js"></script>
</body>
</html>
